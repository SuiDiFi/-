# 火山方舟 - 图像/3D 模型（不同额度，按需开启）
volc_image_2m:
  daily_limit: 2000000
  base_weight: 0.8
  priority: 3
  endpoint: https://ark.cn-beijing.volces.com/api/v3/chat/completions
  provider: volc_ark
  disabled: true   # 图像模型需要在火山控制台创建 endpoint 后启用
  model_type: image
  models:
    - Doubao-Seedance-1.5-pro
    - Doubao-Seedance-1.0-pro-fast
    - Doubao-Seed3D-2.0
    - Hitem3D-2.0

volc_image_50:
  daily_limit: 50
  base_weight: 0.9
  priority: 4
  endpoint: https://ark.cn-beijing.volces.com/api/v3/chat/completions
  provider: volc_ark
  disabled: true   # 图像模型需要在火山控制台创建 endpoint 后启用
  model_type: text_to_image
  models:
    - Doubao-Seedream-5.0-lite
    - Doubao-Seedream-4.5

volc_image_150k:
  daily_limit: 150000
  base_weight: 0.7
  priority: 3
  endpoint: https://ark.cn-beijing.volces.com/api/v3/chat/completions
  provider: volc_ark
  disabled: true   # 图像模型需要在火山控制台创建 endpoint 后启用
  model_type: image_3d
  models:
    - Hyper3D-Gen2

