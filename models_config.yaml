global:
  api_keys:
    volc_ark: ${VOLC_API_KEY}
    dashscope: ${DASHSCOPE_API_KEY}
  soft_threshold_pct: 90
  hard_threshold_pct: 97
  safety_buffer_pct: 5
  default_estimated_output_tokens: 1500
  timezone: Asia/Shanghai
  persistent_file: usage.json

